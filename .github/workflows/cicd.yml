name: Mobile_Appium_Advanced_CICD

on:
  push:
    branches: ["main"]
  workflow_dispatch:
    inputs:
      device:
        description: "android / ios / both"
        required: true
        default: both
        type: choice
        options:
          - android
          - ios
          - both

jobs:
  test:
    name: test (${{ matrix.device }})
    runs-on: ${{ matrix.device == 'ios' && 'macos-latest' || 'ubuntu-latest' }}
    timeout-minutes: 40

    strategy:
      fail-fast: false
      matrix:
        device: [android]

    if: github.event_name == 'push' || github.event.inputs.device == 'both'

    env:
      PYTHONUNBUFFERED: 1

    steps:
      - uses: actions/checkout@v4

      - uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      # ✅ Appium setup for Android
      - name: Install Appium + Drivers
        run: |
          npm install -g appium@2
          appium driver install uiautomator2@2.30.0

      # ✅ Appium setup for IOS
      - name: Install iOS Driver
        if: matrix.device == 'ios'
        run: |
          appium driver install xcuitest

      # ✅ ANDROID FLOW
      - name: Setup Java 17 (for Android setup)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        if: matrix.device == 'android'
        uses: android-actions/setup-android@v3
        with:
          accept-android-sdk-licenses: false

      - name: Accept Android Licenses (FINAL FIX)
        run: yes | /usr/local/lib/android/sdk/cmdline-tools/16.0/bin/sdkmanager --licenses

      - name: Install Android Packages
        run: |
          sdkmanager "platform-tools"
          sdkmanager "emulator"
          sdkmanager "platforms;android-30"
          sdkmanager "system-images;android-30;google_apis;x86_64"

      - name: Add Emulator to PATH
        run: |
          echo "$ANDROID_HOME/emulator" >> $GITHUB_PATH
          echo "$ANDROID_HOME/tools" >> $GITHUB_PATH
          echo "$ANDROID_HOME/tools/bin" >> $GITHUB_PATH
          echo "$ANDROID_HOME/platform-tools" >> $GITHUB_PATH

      # 🔥 SWITCH TO JAVA 11 HERE
      - name: Force Java 11 for AVD
        run: |
          export JAVA_HOME=$JAVA_HOME_11_X64
          export PATH=$JAVA_HOME/bin:$PATH
          java -version

      - name: Create Emulator
        if: matrix.device == 'android'
        run: |
          echo "no" | avdmanager create avd -n emulator -k "system-images;android-30;google_apis;x86_64" --force

      - name: Start Emulator
        if: matrix.device == 'android'
        run: |
          emulator -avd emulator -no-window -no-audio -no-boot-anim &
          adb wait-for-device
          adb shell input keyevent 82

      - name: Wait for Emulator Fully Ready
        if: matrix.device == 'android'
        run: |
          boot_completed=""
          until [[ "$boot_completed" == "1" ]]; do
            boot_completed=$(adb shell getprop sys.boot_completed 2>/dev/null | tr -d "\r")
            echo "Waiting for emulator to boot..."
            sleep 5
          done
          adb shell input keyevent 82
      
          # 🔥 Disable animations (reduce flakiness)
          adb shell settings put global window_animation_scale 0
          adb shell settings put global transition_animation_scale 0
          adb shell settings put global animator_duration_scale 0

      # ✅ Download APK
      - name: Install App (Android)
        if: matrix.device == 'android'
        run: |
            wget https://github.com/ranjangowda123/mobile-automation-framework-appium-python/releases/download/v1/android_app.apk

      # ✅ Install App (Android)
      - name: Install App (Android)
        if: matrix.device == 'android'
        run: adb install android_app.apk

      # ✅ IOS REAL FLOW
      - name: Setup iOS Simulator
        if: matrix.device == 'ios'
        run: |
          xcodebuild -version
          echo "Available devices:"
          xcrun simctl list devices available

          # Get first available iPhone simulator
          DEVICE=$(xcrun simctl list devices available | grep "iPhone" | head -n 1 | awk -F '[()]' '{print $2}')
    
          echo "Using device: $DEVICE"
    
          xcrun simctl boot "$DEVICE" || true
      
          # Save for next steps
          echo "DEVICE_ID=$DEVICE" >> $GITHUB_ENV

      - name: Wait for iOS Simulator Ready
        if: matrix.device == 'ios'
        run: |
          xcrun simctl bootstatus "$DEVICE_ID" -b
      
      # ✅ Install App (iOS)
      - name: Install App (iOS)
        if: matrix.device == 'ios'
        run:  |
              xcrun simctl install "$DEVICE_ID" apps/ios_app.app

      # ✅ Start Appium
      - name: Start Appium Server
        run: |
          appium --log-level error &
          sleep 15

      # ✅ ADD THIS
      - name: Verify Appium is running
        run: |
          curl http://127.0.0.1:4723/status

      # ✅ Run tests
      - name: Run Tests
        run: |
          pytest -n 2 \
          -m regression \
          --reruns 2 \
          --reruns-delay 5 \
          --alluredir=allure-results \
          --maxfail=1 --disable-warnings \
          --device=${{ matrix.device }}

      # ✅ Reports & Artifacts - Final Version
      # Upload logs, screenshots, and Allure results as artifacts
      - if: always()
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.device }}
          path: |
            allure-results
            reports/screenshots/
            reports/log_path/

      # Install Allure CLI
      - name: Install Allure
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.36.0/allure-2.36.0.tgz
          tar -zxvf allure-2.36.0.tgz
          sudo mv allure-2.36.0 /opt/allure
          sudo ln -s /opt/allure/bin/allure /usr/bin/allure

      # Load Allure History Trend
      - name: Load Allure History
        if: always()
        run: |
          mkdir -p allure-results/history
          if [ -d allure-history ]; then
            cp -r allure-history/* allure-results/history || true
          fi

      # Add executor.json
      - name: Add Allure Executor
        run: |
          mkdir -p allure-results
          echo '{
            "name": "GitHub Actions",
            "type": "github",
            "buildOrder": "${{ github.run_number }}"
          }' > allure-results/executor.json

      # Generate HTML Allure report
      - name: Generate Allure Report
        run: |
          allure generate allure-results --clean -o allure-report

      # Save Allure History Trend
      - name: Save Allure History
        if: always()
        run: |
          mkdir -p allure-history
          if [ -d allure-report/history ]; then
            cp -r allure-report/history/* allure-history || true
          fi

      # Publish Allure report to GitHub Pages
      - uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: allure-report
          destination_dir: ${{ matrix.device }}